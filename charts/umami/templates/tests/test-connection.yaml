apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "umami.fullname" . }}-test-connection"
  labels:
    {{- include "umami.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "umami.fullname" . }}:{{ .Values.service.ports.http }}/api/heartbeat']
  restartPolicy: Never
