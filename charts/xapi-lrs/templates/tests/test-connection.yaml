apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "xapi-lrs.fullname" . }}-test-connection"
  labels:
    {{- include "xapi-lrs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: readyz
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '-S'
        - '{{ include "xapi-lrs.fullname" . }}:{{ .Values.service.ports.admin }}/readyz'
  restartPolicy: Never
