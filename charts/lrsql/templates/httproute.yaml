{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if or .Values.httpRoute.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" ( dict "values" ( list .Values.httpRoute.annotations .Values.commonAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.httpRoute.listenerSet.enabled }}
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: {{ include "common.names.fullname" . }}
      namespace: {{ include "common.names.namespace" . | quote }}
    {{- else }}
    - group: {{ .Values.httpRoute.gateway.group }}
      kind: {{ .Values.httpRoute.gateway.kind }}
      name: {{ .Values.httpRoute.gateway.name | required "httpRoute.gateway.name is required when httpRoute is enabled" }}
      namespace: {{ .Values.httpRoute.gateway.namespace | quote }}
      {{- if .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ .Values.httpRoute.gateway.sectionName }}
      {{- end }}
      {{- if .Values.httpRoute.gateway.port }}
      port: {{ .Values.httpRoute.gateway.port }}
      {{- end }}
    {{- end }}
  {{- if or .Values.httpRoute.hostname .Values.httpRoute.extraHostnames }}
  hostnames:
    {{- if .Values.httpRoute.hostname }}
    - {{ .Values.httpRoute.hostname | quote }}
    {{- end }}
    {{- range .Values.httpRoute.extraHostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.rules }}
    {{- toYaml .Values.httpRoute.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: {{ .Values.httpRoute.pathType }}
            value: {{ .Values.httpRoute.path }}
      backendRefs:
        - name: {{ include "common.names.fullname" . }}
          port: {{ .Values.service.ports.http }}
    {{- end }}
{{- end }}
